{{ define "main" }}

<section class="section">
  <div class="container">
    {{ range (where .Site.RegularPages "Section" "gallery") }}
      <div class="row justify-content-center">
        <div class="col-12 text-center mb-5">
          <h1>{{ .Title }}</h1>
        </div>
        <div class="col-12 col-lg-10">
          <div class="content">
            {{ .Content }}
          </div>
        </div>
      </div>
    {{ end }}
  </div>
</section>

{{ end }}
